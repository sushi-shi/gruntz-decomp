# units.toml - the per-translation-unit build manifest (single source of truth).
#
# This file is per-TU; it is the counterpart to build/gen/symbol_names.csv, which
# is per-FUNCTION (rva,name,unit). Every `unit` here MUST line up with a `unit`
# value used in symbol_names.csv so the recompiled base object pairs with the
# delinked target object of the same name. configure.py reads this manifest and
# emits build.ninja + the objdiff project JSON.
#
# [build]  - global toolchain config: compiler/platform pass through to the
#            objdiff scratch block.
# [flags]  - named flag profiles (full flag sets); EVERY [[unit]] selects one via
#            `flags = "<name>"`. `base` is the locked VC5 default (cl /c /O2 /MT,
#            cdecl; see docs/zlib-matching.md); `eh` adds the C++ exception-
#            handling frame (/GX); `mfc` is the MFC-derived /O1 (favor size) + /GX;
#            `framed` adds /Oy- (keep frame pointers); `framedeh` = framed + /GX.
# [[unit]] - one TU: `unit` (stem; obj is <unit>.obj, target <unit>.c.obj; must
#            match symbol_names.csv's unit column), `source` (repo-relative path),
#            and `flags` (a [flags] profile name). Pick the profile whose FULL set
#            you need - /GX is a profile choice (eh/mfc/framedeh), never a bolt-on.
#
# Per-TU /GR (RTTI) knob (`extra`) - CURRENTLY UNUSED, kept as an escape hatch:
# MSVC5 enables RTTI only under /GR (default OFF), so a polymorphic class compiled
# here emits a vtable with NO Complete Object Locator - matching retail's NON-RTTI
# vtables. To match an RTTI class (retail vtable carries a COL at vtable-4) the
# compiler must emit the COL + RTTI tree (??_R0..R4), which would need
# `extra = ["/GR"]` on that TU. No reconstructed unit needs this yet. (/GX is NOT
# an `extra` - it lives in the eh/mfc/framedeh profiles.) When first needed it is
# matching-NEUTRAL until a unit reconstructs its full vtable + base subobject and
# opts in. See docs/vtable-map.md.
#
# Add a TU: add an [[unit]] block here (+ its functions to symbol_names.csv), then
# re-run `python3 configure.py` and `ninja`.

[build]
compiler = "msvc5.0"
platform = "win32"

[flags]
base   = ["/nologo", "/c", "/O2", "/MT"]
eh     = ["/nologo", "/c", "/O2", "/MT", "/GX"]
mfc    = ["/nologo", "/c", "/O1", "/MT", "/GX"]
# framed: /O2 with frame-pointer omission DISABLED. Retail compiled the
# registry/COM helper module (0x1bf*-0x1d5*) with ebp frames retained yet fully
# register-allocated. docs/patterns/o2-optimizer-bailout-framed.md.
framed = ["/nologo", "/c", "/O2", "/MT", "/Oy-"]
framedeh = ["/nologo", "/c", "/O2", "/MT", "/Oy-", "/GX"]
o1     = ["/nologo", "/c", "/O1", "/MT"]
# unoptimized + intrinsics: full ebp frame, every local/arg through memory, plain
# idiv (no strength reduction), yet pow/etc. via the __CIxxx FP intrinsic (/Oi).
odi    = ["/nologo", "/c", "/Od", "/Oi", "/MT"]
od     = ["/nologo", "/c", "/Od", "/MT"]


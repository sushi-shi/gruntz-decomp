# calls Reset, then the member destructors run on unwind. The member sub-objects
# with destructors put a C++ EH frame around the ctor/dtor (__CxxFrameHandler +
# FuncInfo) -> built with /GX; engine code -> /O2.
# 7/7 claimed fns BYTE-EXACT (reloc-masked operands only): CMapMgr ctor/dtor/Reset
# + CMapArrayA ctor/dtor + CMapArrayB ctor/dtor. The two free-list builders
# Allocate@CMapArrayA @0x09e740 / Allocate@CMapArrayB @0x09e860 are an MSVC5
# reg-alloc + strength-reduction plateau (~70%/64%, all offsets/strides correct) -
# bodies kept in MapMgr.cpp to document the element strides 0x24/0x0c but NOT
# claimed in symbol_names.csv. See docs/match-learnings.md.
[[unit]]

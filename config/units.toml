# --- CGameLevel WWD level-load orchestrator (src/Gruntz) --------------------
# CGameLevel::LoadWwd @0x15d280 (vtable slot 0x38): validates the WWD header,
# copies the 1524-byte header, optionally inflates the compressed main block
# (operator new + WwdFile::InflateMainBlock, tracked by a C++ EH state so the
# buffer frees on unwind -> /GX), then loops the planes calling WwdFile::ReadPlane
# @0x15d8d0 and the image-set descriptors, and finally recomputes the scaled start
# coords. CPlane / CImageSet / ReadImageSet / RecomputePlaneCoords / ReadPlane /
# InflateMainBlock / operator new/delete / SetAtGrow are reloc-masked engine calls.
# Faithful carcass (driven toward byte-exact). /O2 engine code.
[[unit]]
unit = "gamelevel"
source = "src/Gruntz/GameLevel.cpp"
status = "wip"
cflags = ["/nologo", "/c", "/O2", "/MT", "/GX"]

# --- Engine file-stream class (src/Io) --------------------------------------
# CFileIO - the KERNEL32 file-I/O wrapper (MFC CFile work-alike) that gates ALL
# engine file I/O (RezMgr, WwdFile, save/load). The leaf methods wrap CreateFileA
# /ReadFile/WriteFile/SetFilePointer/CloseHandle; the ctor/dtor construct a
# CString member + carry a C++ EH frame (__CxxFrameHandler + FuncInfo) -> /GX.
# Built with /O1 (optimize for SIZE), NOT the locked /O2: this is MFC-derived
# code (CFile) and MFC was shipped /O1 - it pushes memory operands directly and
# keeps ebp frames for address-taken locals, which /O2 (favor speed) does not.
[[unit]]
unit = "filestream"
source = "src/Io/FileStream.cpp"
status = "matched"
cflags = ["/nologo", "/c", "/O1", "/MT", "/GX"]


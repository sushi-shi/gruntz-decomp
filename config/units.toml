# --- CMapMgr level/map manager (src/Gruntz) ---------------------------------
# The engine CMapMgr (self-located via its RTTI vftable ??_7CMapMgr@@6B@
# @0x5ea3b4, 6 slots): ctor @0x09e940 + dtor @0x09e9e0 + the slot-0 Reset cleanup
# @0x09ec30, plus the two embedded growable-array sub-objects it owns
# (CMapArrayA @+0x30 / CMapArrayB @+0x3c). The ctor constructs the two array

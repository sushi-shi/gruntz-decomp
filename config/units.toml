# resource/file node, 0x24 B) + CRezDir (subdirectory node, 0x38 B) ctors pin the
# container layouts (previously @unconfirmed in structure/formats/rez.h, now
# CONFIRMED). 3 BYTE-EXACT: CRezItm ctor @0x13c540, FindEntry @0x13c080 (a stat,
# NOT a binary search), CRezDirNode::Load @0x13a0f0 (recursive walk + "File is
# not sorted!" assert). CRezDir ctor @0x13c940 PLATEAUS at 78% on an MSVC5
# constant-scheduling residue (all 14 stores correct; see RezMgr.cpp). Extended
# with the RezMgr/CGruntzMgr path/key builders: MakeImageKey @0x13e5d0 BYTE-EXACT
# (ext-dispatch .BMP/.PCX/.PID image load) and MakeRezPath @0x091670 PLATEAU ~92%
# (archive-path builder; a single MSVC5 EH-state write over 4 CString live ranges
# - see RezMgr.cpp/docs). OpenSub @0x13b0c0 (568 B, a 3rd distinct node layout +
# heavy EH/CString/virtual entropy) DEFERRED. /GX for the EH frames; /O2 engine.
[[unit]]
unit = "rezmgr"
source = "src/Rez/RezMgr.cpp"
status = "wip"
cflags = ["/nologo", "/c", "/O2", "/MT", "/GX"]

# --- Image resolution path (src/Image) --------------------------------------
# The REZ -> image load path. CImage::LoadFromRez @0x175a90 is the file-extension
# DISPATCHER (strrchr('.') + a stricmp ladder on .BMP/.PCX/.RID/.PID, forwarding
# (name,a2,a3) to one of five sibling __thiscall loaders, else a default) - the
# same idiom as RezMgr::MakeImageKey. The four extension literals are reloc-masked
# file-scope globals; strrchr/stricmp are the engine CRT helpers. The five sibling
# loaders are external/no-body (reloc-masked calls). CFileImage::Load{Bmp,Pcx,Pid}
# (@0x144110/0x145110/0x145cd0) are the file-backed format consumers: stack CFileIO
# Open/GetLength/`operator new`/Read/decode/free. The CFileIO stack object's dtor
# carries a C++ EH frame -> /GX; engine code -> /O2.
# 4/4 BYTE-EXACT (verified 0 non-reloc mismatches over 97/106/106/95 instrs each;
# fuzzy 99.3-99.95%, residue = reloc-masked operands: the 4 ext-string globals,
# strrchr/stricmp/operator new/delete/CFileIO calls, and the 5 sibling/3 decoder
# call targets - the standard "reloc-masked but byte-exact" idiom).
[[unit]]
unit = "image"
source = "src/Image/Image.cpp"
status = "matched"
cflags = ["/nologo", "/c", "/O2", "/MT", "/GX"]


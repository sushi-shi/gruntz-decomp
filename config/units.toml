# factory (*0x64556c -> +0x30 -> +0x8, __thiscall @0x1597b0) from the sprite's
# class-name string + HUD-geometry values off this->m_10 (+0x5c / +0x60-N), runs
# its init virtual (slot 0x10), and registers it into the grunt's sprite
# collection (sprite->m_7c->m_18 . Add*). No stack C++ object / no EH frame here
# -> plain /O2 /MT (no /GX). Sprite member slots pinned: selected@+0x1b8,
# toy@+0x1bc, health@+0x1c4, stamina@+0x1c8, toyTime@+0x1cc, wingzTime@+0x1d0,
# powerup@+0x1d4. The factory + the four Add* registrars are reached via
# incremental-link thunks -> declared external/no-body so the call rel32
# displacements reloc-mask.
[[unit]]
unit = "grunt"
source = "src/Gruntz/Grunt.cpp"
status = "wip"
# /GX: the animation-resolver cluster (Resolve*Animation) builds animation-key
# strings via stack CString temporaries (operator+) whose dtors run under a C++
# EH frame. The 7 HUD sprite creators carry no stack C++ object, so /GX does not
# add an EH frame to them (verified - they stay byte-exact).
cflags = ["/nologo", "/c", "/O2", "/MT", "/GX"]

